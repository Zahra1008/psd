<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex">
    <script>if(localStorage.getItem('role') !== 'admin') window.location.href='index.html';</script>
    <div class="w-64 bg-slate-900 text-white min-h-screen p-6">
        <h2 class="text-2xl font-bold mb-10">ADMIN</h2>
        <button onclick="loadSection('bookings')" class="block w-full text-left py-2">Reservasi</button>
        <button onclick="loadSection('rooms')" class="block w-full text-left py-2">Kamar</button>
        <button onclick="localStorage.clear();window.location.href='index.html'" class="mt-10 text-red-400">Logout</button>
    </div>
    <div class="p-10 w-full" id="mainContent"></div>

    <script>
        async function loadSection(sec) {
            const main = document.getElementById('mainContent');
            if(sec === 'bookings') {
                const res = await fetch('/api/admin/bookings');
                const data = await res.json();
                main.innerHTML = `<h2 class="text-2xl font-bold mb-4">List Reservasi</h2>` + data.reverse().map(b => `
                    <div class="bg-white p-4 mb-2 rounded shadow flex justify-between items-center">
                        <div>
                            <span class="text-xs font-bold ${b.status==='Accepted'?'text-green-500':'text-orange-500'}">${b.status}</span>
                            <p class="font-bold">${b.customerName} - ${b.roomType}</p>
                            <p class="text-xs">${b.adults} Dewasa, ${b.children} Anak | Rp ${b.totalPrice.toLocaleString()}</p>
                        </div>
                        <div>
                            ${b.status==='Pending' ? `<button onclick="acc(${b.id})" class="bg-blue-500 text-white px-3 py-1 rounded text-xs">Accepted</button>` : ''}
                            <button onclick="delB(${b.id})" class="bg-red-500 text-white px-3 py-1 rounded text-xs ml-1">Delete</button>
                        </div>
                    </div>
                `).join('');
            } else {
                const res = await fetch('/api/rooms');
                const data = await res.json();
                main.innerHTML = `<button onclick="addR()" class="bg-green-500 text-white px-4 py-2 mb-4 rounded">Tambah Kamar</button>` + data.map(r => `
                    <div class="bg-white p-4 mb-2 rounded shadow flex justify-between">
                        <p>${r.name} - Rp ${r.price.toLocaleString()} (Stok: ${r.stock})</p>
                        <button onclick="delR('${r.id}')" class="text-red-500">Hapus</button>
                    </div>
                `).join('');
            }
        }

        async function acc(id) {
            await fetch(`/api/admin/bookings/${id}/accept`, {method:'PATCH'});
            loadSection('bookings');
        }
        async function delB(id) {
            await fetch(`/api/admin/bookings/${id}`, {method:'DELETE'});
            loadSection('bookings');
        }
        async function addR() {
            const name = prompt("Nama:"); const price = prompt("Harga:"); const stock = prompt("Stok:");
            if(name) {
                await fetch('/api/rooms', {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({name, price, stock})
                });
                loadSection('rooms');
            }
        }
        window.onload = () => loadSection('bookings');
    </script>
</body>
</html>
